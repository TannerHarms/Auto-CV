name: Docs Markdown

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs-markdown.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install --global markdownlint-cli2

      - name: Lint markdown files
        run: markdownlint-cli2

  autofix:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install --global markdownlint-cli2

      - name: Auto-fix markdown files
        run: markdownlint-cli2 --fix

      - name: Commit markdown fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-fix markdown formatting'
          file_pattern: '*.md .markdownlint-cli2.jsonc'