

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Avery Quinn</title>
  <style>
    :root {
      
      --color-primary: #153243;
      
      --color-secondary: #5D5D5D;
      
      --color-accent: #2A9D8F;
      
      --color-text: #333333;
      
      --color-heading: #CC5500;
      
      --color-background: #FFFFFF;
      
      --color-link: #0395DE;
      
      --color-border: #999999;
      
      --font-heading: Helvetica;
      
      --font-body: Source Sans Pro;
      
      --font-mono: Source Code Pro;
      
      --font-size-base: 11pt;
      
      --font-size-heading: 16pt;
      
      --font-size-name: 32pt;
      
      --font-size-small: 8pt;
      
      --font-size-bullet: 8.5pt;
      
      --spacing-page-margin: 0.75in;
      
      --spacing-section-gap: 10pt;
      
      --spacing-entry-gap: 5pt;
      
      --spacing-line-height: 1.2;
      
      --spacing-header-to-content: 1.5mm;
      
      --spacing-skill-label-width: 4.5cm;
      
      --spacing-bullet-before: -2.0mm;
      
      --spacing-bullet-list-topsep: -1.2mm;
      
      --spacing-bullet-after: 1.2mm;
      
      --spacing-bullet-marker: dash;
      
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body), Georgia, serif;
      font-size: var(--font-size-base);
      line-height: var(--spacing-line-height);
      color: var(--color-text);
      background: var(--color-background);
      max-width: 850px;
      margin: 0 auto;
      padding: var(--spacing-page-margin);
    }

    a { color: var(--color-link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .resume-nav {
      display: flex; gap: 1rem; justify-content: center;
      margin-bottom: 1.5rem; padding: 0.5rem 0;
      border-bottom: 1px solid var(--color-border);
    }
    .nav-link { font-size: 0.9rem; color: var(--color-link); }
    .nav-link.active { font-weight: 700; color: var(--color-primary); }

    .page-title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      color: var(--color-heading);
      border-bottom: 2px solid var(--color-primary);
      padding-bottom: 4px;
      margin-bottom: 1rem;
    }

    .page-content img { max-width: 100%; }
    .page-content h1, .page-content h2, .page-content h3 { color: var(--color-heading); margin: 1rem 0 0.5rem; }
    .page-content p { margin-bottom: 0.75rem; }

    @media print {
      body { max-width: 100%; padding: 0.5in; }
      .resume-nav { display: none; }
    }
  </style>
  
</head>
<body>
  

<nav class="resume-nav">
  <a href="index.html" class="nav-link ">Resume</a>
  
  <a href="portfolio.html" class="nav-link active">Portfolio</a>
  
</nav>



  <h1 class="page-title">Portfolio</h1>
  <div class="page-content">
    <h1>Portfolio</h1>
<p>Additional project details and architecture notes can be maintained here for the HTML output experience.</p>
  </div>

  
</body>
</html>
